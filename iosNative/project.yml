name: AllergieCheck
options:
  bundleIdPrefix: com.patbed8
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "6.0"
  DEVELOPMENT_TEAM: ""
targets:
  AllergieCheck:
    type: application
    platform: iOS
    sources:
      - AllergieCheck
    settings:
      INFOPLIST_FILE: AllergieCheck/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      PRODUCT_BUNDLE_IDENTIFIER: com.patbed8.allergiecheck
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      TARGETED_DEVICE_FAMILY: "1"
      SWIFT_STRICT_CONCURRENCY: minimal
